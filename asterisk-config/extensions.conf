[globals]
TRUNK=PJSIP/trunk
OUTBOUND_CALLER_ID=0518953900

[from-internal]
; Agent extensions - direct dial (internal calls)
exten => 8013,1,NoOp(Calling Agent 8013)
exten => 8013,n,Dial(PJSIP/8013,30)
exten => 8013,n,Hangup()

exten => 8014,1,NoOp(Calling Agent 8014)
exten => 8014,n,Dial(PJSIP/8014,30)
exten => 8014,n,Hangup()

; Test extension (for local testing)
exten => 9000,1,NoOp(Calling Test Extension 9000)
exten => 9000,n,Dial(PJSIP/9000,30)
exten => 9000,n,Hangup()

; ============================================================================
; OUTBOUND CALLS - DIRECT SOFTPHONE DIALING
; ============================================================================
; Handles direct softphone dialing (agent dials number directly from X-Lite)
; Channel will be like PJSIP/8013 or PJSIP/8014 (softphone extension), EXTEN is phone number
exten => _X.,1,NoOp(Direct softphone call to ${EXTEN} from ${CHANNEL})
; Check if this is from a Local channel (AMI-originated from dialer) - skip direct dialing
same => n,GotoIf($["${CHANNEL:0:6}"="Local/"]?skip_direct)
; Set caller ID
same => n,Set(CALLERID(all)="${OUTBOUND_CALLER_ID}")
same => n,NoOp(Dialing ${EXTEN} through trunk ${TRUNK} from softphone ${CHANNEL})
; Dial customer through trunk with 30-second timeout
same => n,Dial(${TRUNK}/sip:${EXTEN}@10.50.161.239,30,g)
same => n,NoOp(Call ended, DialStatus: ${DIALSTATUS})
same => n,Hangup()
same => n(skip_direct),NoOp(Skipping direct dial - this is an AMI-originated Local channel)

; ============================================================================
; AUTO-CONNECT CONTEXT - FOR DIALER-INITIATED CALLS
; ============================================================================
; This context handles Local channels created by AMI from the dialer
; Format: Local/{customer_number}@auto-connect
; Flow:
; 1. Local channel auto-answers (no ringing on softphone)
; 2. Dial customer through trunk
; 3. When customer answers, bridge to agent's softphone (already connected, no ringing)
[auto-connect]
exten => _X.,1,NoOp(Auto-connect call: Customer ${EXTEN}, Agent from variable ${AGENT_EXTENSION})
; Get agent extension from variable (passed from AMI via variables)
; Use AGENT_EXTENSION variable directly (set by AMI Originate)
same => n,Set(AGENT_EXT=${AGENT_EXTENSION})
; Ensure AGENT_EXT is set (fallback to 8014 if still empty)
same => n,Set(AGENT_EXT=${IF($["${AGENT_EXT}"=""]?8014:${AGENT_EXT})})
same => n,NoOp(Using agent extension: ${AGENT_EXT})
; Auto-answer the Local channel immediately (no ringing on softphone)
same => n,Answer()
; Very short wait to ensure Local channel is fully answered
same => n,Wait(0.1)
; Set caller ID
same => n,Set(CALLERID(all)="${OUTBOUND_CALLER_ID}")
same => n,NoOp(Dialing customer ${EXTEN} through trunk ${TRUNK}, will auto-connect to agent ${AGENT_EXT})
; Dial customer through trunk with 30-second timeout
; When customer answers, we'll bridge to agent
same => n,Dial(${TRUNK}/sip:${EXTEN}@10.50.161.239,30,g)
; Check dial status
same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?bridge_agent)
; Customer didn't answer or call failed
same => n,NoOp(Call ended without customer answer, DialStatus: ${DIALSTATUS})
same => n,Hangup()

; Bridge to agent when customer answers
same => n(bridge_agent),NoOp(Customer answered, bridging to agent ${AGENT_EXT} - call already connected, no ringing)
; Since Local channel is already answered, when we dial agent, it will be auto-connected
; Use very short timeout (1 second) since call should connect immediately
same => n,Dial(PJSIP/${AGENT_EXT},1,Ag)
same => n,NoOp(Call ended)
same => n,Hangup()

[from-trunk]
; Incoming calls from trunk
exten => _X.,1,NoOp(Incoming call to ${EXTEN} from ${CALLERID(num)})
exten => _X.,n,Set(CALLERID(num)=${CALLERID(num)})
exten => _X.,n,Dial(PJSIP/8013,20)
exten => _X.,n,Dial(PJSIP/8014,20)
exten => _X.,n,Hangup()
